<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Bag body (back) -->
  <rect x="75" y="100" width="155" height="210" rx="6" fill="#f0f0f0" filter="url(#shadow)"/>
  <!-- Red stripe top -->
  <rect x="75" y="100" width="155" height="38" rx="6" fill="#cc2222"/>
  <!-- Red stripe middle -->
  <rect x="75" y="210" width="155" height="38" fill="#cc2222"/>
  <!-- White middle section -->
  <rect x="75" y="138" width="155" height="72" fill="white"/>
  <!-- Brand text back bag -->
  <text x="152" y="170" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#111" text-anchor="middle">U-Pak</text>
  <text x="152" y="195" font-family="Arial, sans-serif" font-size="8" fill="#555" text-anchor="middle">www.upak.co.za</text>
  <!-- Bottom section -->
  <rect x="75" y="248" width="155" height="62" rx="0" fill="#f0f0f0"/>
  <text x="152" y="288" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#111" text-anchor="middle">500</text>

  <!-- Bag body (front, slightly offset) -->
  <rect x="170" y="80" width="155" height="220" rx="6" fill="#f5f5f5" filter="url(#shadow)"/>
  <!-- Red stripe top front -->
  <rect x="170" y="80" width="155" height="40" rx="6" fill="#cc2222"/>
  <!-- Red stripe middle front -->
  <rect x="170" y="205" width="155" height="40" fill="#cc2222"/>
  <!-- White section front -->
  <rect x="170" y="120" width="155" height="85" fill="white"/>
  <!-- Brand name front -->
  <text x="247" y="155" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#111" text-anchor="middle">U-Pak</text>
  <text x="247" y="178" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">SUPER STRONG</text>
  <text x="247" y="192" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">BREAD BAG</text>
  <!-- Bottom front section -->
  <rect x="170" y="245" width="155" height="55" fill="#f5f5f5"/>
  <text x="247" y="282" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="#111" text-anchor="middle">500</text>
  <!-- Size text -->
  <text x="247" y="90" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">SIZE 230 x 430mm</text>

  <!-- Bottom shadow -->
  <ellipse cx="200" cy="308" rx="130" ry="12" fill="#aa1111" opacity="0.15"/>

  <!-- Label at bottom -->
  <rect x="55" y="328" width="290" height="44" rx="6" fill="white" opacity="0.9"/>
  <text x="200" y="347" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a0000" text-anchor="middle">U-PAK SUPER STRONG BREAD BAGS</text>
  <text x="200" y="364" font-family="Arial, sans-serif" font-size="10" fill="#cc2222" text-anchor="middle">Size 230x430mm · Pack of 500</text>
</svg>
