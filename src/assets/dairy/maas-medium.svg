<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dceeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="7" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Large tub body -->
  <rect x="105" y="140" width="190" height="180" rx="14" fill="url(#containerGrad)" filter="url(#shadow)"/>
  <!-- Lid -->
  <rect x="95" y="120" width="210" height="34" rx="10" fill="#1a8844"/>
  <rect x="110" y="128" width="180" height="18" rx="6" fill="#22aa55" opacity="0.6"/>

  <!-- Label area -->
  <rect x="105" y="185" width="190" height="90" fill="#1a8844"/>
  <!-- White band -->
  <rect x="105" y="222" width="190" height="20" fill="white" opacity="0.2"/>

  <!-- Label text -->
  <text x="200" y="208" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="white" text-anchor="middle">FULL CREAM MAAS</text>
  <text x="200" y="222" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.85" text-anchor="middle">Premium Quality</text>
  <text x="200" y="248" font-family="Arial Black, sans-serif" font-size="30" font-weight="900" fill="white" text-anchor="middle">2kg</text>
  <text x="200" y="268" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Large</text>

  <!-- Top white area of tub -->
  <rect x="105" y="140" width="190" height="45" rx="14" fill="white" opacity="0.6"/>
  <text x="200" y="168" font-family="Arial, sans-serif" font-size="10" fill="#1a8844" text-anchor="middle" font-weight="bold">AKIRA INVESTMENTS</text>

  <!-- Bottom section -->
  <rect x="105" y="275" width="190" height="45" rx="14" fill="white" opacity="0.5"/>
  <text x="200" y="302" font-family="Arial, sans-serif" font-size="10" fill="#1a8844" text-anchor="middle">Wholesale Distribution</text>

  <!-- Shadow -->
  <ellipse cx="200" cy="328" rx="110" ry="10" fill="#1a8844" opacity="0.15"/>

  <!-- Label at bottom -->
  <rect x="60" y="350" width="280" height="38" rx="6" fill="white" opacity="0.9"/>
  <text x="200" y="366" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a2e3d" text-anchor="middle">FULL CREAM MAAS – LARGE</text>
  <text x="200" y="381" font-family="Arial, sans-serif" font-size="10" fill="#1a8844" text-anchor="middle">2kg · Premium Quality</text>
</svg>
