<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dceeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="7" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Large tub body -->
  <rect x="90" y="130" width="220" height="195" rx="14" fill="url(#containerGrad)" filter="url(#shadow)"/>
  <!-- Lid -->
  <rect x="80" y="110" width="240" height="36" rx="10" fill="#2255aa"/>
  <rect x="95" y="118" width="210" height="20" rx="6" fill="#3366cc" opacity="0.6"/>

  <!-- Label area -->
  <rect x="90" y="175" width="220" height="100" fill="#2255aa"/>
  <!-- White band -->
  <rect x="90" y="215" width="220" height="22" fill="white" opacity="0.2"/>

  <!-- Label text -->
  <text x="200" y="200" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="white" text-anchor="middle">FULL CREAM MAAS</text>
  <text x="200" y="218" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.85" text-anchor="middle">Premium Quality</text>
  <text x="200" y="248" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">4kg</text>
  <text x="200" y="268" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.8" text-anchor="middle">Extra Large</text>

  <!-- Top white area of tub -->
  <rect x="90" y="130" width="220" height="45" rx="14" fill="white" opacity="0.6"/>
  <text x="200" y="158" font-family="Arial, sans-serif" font-size="10" fill="#2255aa" text-anchor="middle" font-weight="bold">AKIRA INVESTMENTS</text>

  <!-- Bottom section -->
  <rect x="90" y="275" width="220" height="50" rx="14" fill="white" opacity="0.5"/>
  <text x="200" y="305" font-family="Arial, sans-serif" font-size="10" fill="#2255aa" text-anchor="middle">Wholesale Distribution</text>

  <!-- Shadow -->
  <ellipse cx="200" cy="333" rx="120" ry="11" fill="#2255aa" opacity="0.15"/>

  <!-- Label at bottom -->
  <rect x="60" y="350" width="280" height="38" rx="6" fill="white" opacity="0.9"/>
  <text x="200" y="366" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a2e3d" text-anchor="middle">FULL CREAM MAAS – EXTRA LARGE</text>
  <text x="200" y="381" font-family="Arial, sans-serif" font-size="10" fill="#2255aa" text-anchor="middle">4kg · Premium Quality</text>
</svg>
