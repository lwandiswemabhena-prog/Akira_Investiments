<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dceeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f4ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="7" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Smaller tub body -->
  <rect x="125" y="155" width="150" height="160" rx="12" fill="url(#containerGrad)" filter="url(#shadow)"/>
  <!-- Lid -->
  <rect x="115" y="135" width="170" height="30" rx="9" fill="#aa5500"/>
  <rect x="128" y="143" width="144" height="16" rx="5" fill="#cc6600" opacity="0.6"/>

  <!-- Label area -->
  <rect x="125" y="197" width="150" height="80" fill="#aa5500"/>
  <!-- White band -->
  <rect x="125" y="230" width="150" height="18" fill="white" opacity="0.2"/>

  <!-- Label text -->
  <text x="200" y="217" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="white" text-anchor="middle">FULL CREAM</text>
  <text x="200" y="229" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="white" text-anchor="middle">MAAS</text>
  <text x="200" y="255" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle">1kg</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.8" text-anchor="middle">Medium</text>

  <!-- Top white area of tub -->
  <rect x="125" y="155" width="150" height="42" rx="12" fill="white" opacity="0.6"/>
  <text x="200" y="181" font-family="Arial, sans-serif" font-size="10" fill="#aa5500" text-anchor="middle" font-weight="bold">AKIRA INVESTMENTS</text>

  <!-- Bottom section -->
  <rect x="125" y="277" width="150" height="38" rx="12" fill="white" opacity="0.5"/>
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="9" fill="#aa5500" text-anchor="middle">Wholesale</text>

  <!-- Shadow -->
  <ellipse cx="200" cy="322" rx="95" ry="9" fill="#aa5500" opacity="0.15"/>

  <!-- Label at bottom -->
  <rect x="60" y="345" width="280" height="40" rx="6" fill="white" opacity="0.9"/>
  <text x="200" y="362" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a2e3d" text-anchor="middle">FULL CREAM MAAS – MEDIUM</text>
  <text x="200" y="378" font-family="Arial, sans-serif" font-size="10" fill="#aa5500" text-anchor="middle">1kg · Premium Quality</text>
</svg>
